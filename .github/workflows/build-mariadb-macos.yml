name: Build MariaDB for macOS

on:
  workflow_dispatch:
    inputs:
      mariadb_version:
        description: 'MariaDB version to build'
        required: true
        default: '10.6.23'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14        # arm64 (Apple Silicon)
            platform: darwin-arm64
            arch: arm64
          - os: macos-13        # x86_64 (Intel)
            platform: darwin
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build MariaDB ${{ inputs.mariadb_version }} (${{ matrix.platform }})

    steps:
      - name: Install build dependencies
        run: |
          brew install cmake openssl@3 lz4 lzo snappy zstd bison dylibbundler

      - name: Download MariaDB source
        run: |
          VERSION=${{ inputs.mariadb_version }}
          curl -L -o mariadb.tar.gz \
            "https://downloads.mariadb.org/rest-api/mariadb/${VERSION}/mariadb-${VERSION}.tar.gz"
          tar xzf mariadb.tar.gz
          mv mariadb-${VERSION} mariadb-src

      - name: Build MariaDB
        run: |
          OPENSSL_ROOT=$(brew --prefix openssl@3)
          BISON_PREFIX=$(brew --prefix bison)

          mkdir build && cd build

          cmake ../mariadb-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_INSTALL_PREFIX=$PWD/../install \
            -DWITH_SSL=bundled \
            -DWITH_ZLIB=bundled \
            -DWITHOUT_ROCKSDB=ON \
            -DWITHOUT_TOKUDB=ON \
            -DWITHOUT_MROONGA=ON \
            -DWITHOUT_SPIDER=ON \
            -DWITHOUT_CONNECT=ON \
            -DWITHOUT_OQGRAPH=ON \
            -DWITHOUT_SPHINX=ON \
            -DWITHOUT_FEDERATED=ON \
            -DWITHOUT_FEDERATEDX=ON \
            -DWITHOUT_CASSANDRA=ON \
            -DWITHOUT_SEQUENCE=OFF \
            -DWITHOUT_PERFSCHEMA_STORAGE_ENGINE=ON \
            -DWITHOUT_TEST_DB=ON \
            -DWITHOUT_EXAMPLE_STORAGE_ENGINE=ON \
            -DWITH_UNIT_TESTS=OFF \
            -DENABLE_DTRACE=OFF \
            -DPLUGIN_AUTH_PAM=NO \
            -DBISON_EXECUTABLE=$(brew --prefix bison)/bin/bison

          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Bundle dylibs and fix rpaths
        run: |
          BIN_DIR=install/bin
          LIB_DIR=install/lib
          mkdir -p "$LIB_DIR"

          # Use dylibbundler to recursively walk and bundle all non-system dylib deps
          # This handles transitive deps (e.g. libgnutls → libnettle → libgmp, etc.)
          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck; do
            [ -f "$BIN_DIR/$bin" ] || continue
            dylibbundler \
              --bundle-deps \
              --fix-file "$BIN_DIR/$bin" \
              --dest-dir "$LIB_DIR" \
              --install-path "@loader_path/../lib/" \
              --overwrite-files \
              2>&1 | grep -v "^$" || true
          done

          # Fix id on bundled dylibs so they reference themselves correctly
          for dylib in "$LIB_DIR"/*.dylib; do
            [ -f "$dylib" ] && install_name_tool -id "@loader_path/$(basename $dylib)" "$dylib" 2>/dev/null || true
          done

      - name: Strip debug symbols
        run: |
          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck; do
            [ -f "install/bin/$bin" ] && strip -S "install/bin/$bin" || true
          done

      - name: Smoke test — mysqld --version
        run: |
          # MariaDB 10.5+ installs mariadbd; mysqld is a symlink
          MYSQLD=$([ -f ./install/bin/mysqld ] && echo ./install/bin/mysqld || echo ./install/bin/mariadbd)
          $MYSQLD --version

      - name: Ad-hoc sign binaries and dylibs
        run: |
          # dylibbundler calls install_name_tool which invalidates existing signatures.
          # macOS requires all binaries and loaded dylibs to be signed (ad-hoc is sufficient).
          for bin in install/bin/mysqld install/bin/mariadbd install/bin/mysql install/bin/mariadb \
                     install/bin/mysqladmin install/bin/mysqldump install/bin/mysqlcheck; do
            [ -f "$bin" ] && codesign --sign - --force "$bin" && echo "Signed: $bin" || true
          done
          for dylib in install/lib/*.dylib; do
            [ -f "$dylib" ] && codesign --sign - --force "$dylib" || true
          done

      - name: Package
        run: |
          VERSION=${{ inputs.mariadb_version }}
          PLATFORM=${{ matrix.platform }}
          TARNAME="bin-${PLATFORM}-${VERSION}.tar.gz"

          # Mirror the structure Local expects: bin/{platform}/bin/*, lib/*, share/*
          mkdir -p dist/bin dist/lib dist/share

          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck mysql_install_db mariadb-install-db; do
            [ -f "install/bin/$bin" ] && cp "install/bin/$bin" dist/bin/ || true
          done

          cp install/lib/*.dylib dist/lib/ 2>/dev/null || true

          # share/ contains SQL init scripts needed by mysql_install_db
          cp -r install/share/. dist/share/

          tar czf "$TARNAME" -C dist .

          echo "Built: $TARNAME"
          ls -lh "$TARNAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-${{ inputs.mariadb_version }}-${{ matrix.platform }}
          path: bin-${{ matrix.platform }}-${{ inputs.mariadb_version }}.tar.gz
          retention-days: 7
