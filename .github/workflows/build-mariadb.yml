name: Build MariaDB

on:
  workflow_dispatch:
    inputs:
      mariadb_version:
        description: 'MariaDB version to build'
        required: true
        default: '10.6.23'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # arm64 (Apple Silicon)
            platform: darwin-arm64
            arch: arm64
          - os: macos-13        # x86_64 (Intel)
            platform: darwin
            arch: x86_64
          - os: ubuntu-22.04    # Linux x86_64
            platform: linux
            arch: x86_64

    runs-on: ${{ matrix.os }}
    name: Build MariaDB ${{ inputs.mariadb_version }} (${{ matrix.platform }})

    steps:
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl@3 lz4 lzo snappy zstd bison dylibbundler

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake bison libssl-dev libncurses5-dev \
            libpcre2-dev libbz2-dev libzstd-dev liblz4-dev liblzo2-dev \
            libgnutls28-dev

      - name: Download MariaDB source
        run: |
          VERSION=${{ inputs.mariadb_version }}
          curl -L -o mariadb.tar.gz \
            "https://downloads.mariadb.org/rest-api/mariadb/${VERSION}/mariadb-${VERSION}.tar.gz"
          tar xzf mariadb.tar.gz
          mv mariadb-${VERSION} mariadb-src

      - name: Patch CMake minimum version (macOS)
        if: runner.os == 'macOS'
        run: |
          # Homebrew cmake 4.x removed support for cmake_minimum_required(VERSION < 3.5).
          # MariaDB 10.11+ uses VERSION 3.0 which also triggers this. Patch 2.x and 3.0-3.4.
          find mariadb-src -name "CMakeLists.txt" | while read f; do
            sed -i.bak -E \
              's/cmake_minimum_required\(VERSION (2\.[0-9]+(\.[0-9]+)?|3\.[0-4](\.[0-9]+)?)\)/cmake_minimum_required(VERSION 3.5)/g' \
              "$f"
          done
          echo "CMake minimum version patched."
          # Verify the top-level file was fixed
          grep -m1 "cmake_minimum_required" mariadb-src/CMakeLists.txt

      - name: Build MariaDB (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir build && cd build

          cmake ../mariadb-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_INSTALL_PREFIX=$PWD/../install \
            -DWITH_SSL=bundled \
            -DWITH_ZLIB=bundled \
            -DWITHOUT_ROCKSDB=ON \
            -DWITHOUT_TOKUDB=ON \
            -DWITHOUT_MROONGA=ON \
            -DWITHOUT_SPIDER=ON \
            -DWITHOUT_CONNECT=ON \
            -DWITHOUT_OQGRAPH=ON \
            -DWITHOUT_SPHINX=ON \
            -DWITHOUT_FEDERATED=ON \
            -DWITHOUT_FEDERATEDX=ON \
            -DWITHOUT_CASSANDRA=ON \
            -DWITHOUT_SEQUENCE=OFF \
            -DWITHOUT_PERFSCHEMA_STORAGE_ENGINE=ON \
            -DWITHOUT_TEST_DB=ON \
            -DWITHOUT_EXAMPLE_STORAGE_ENGINE=ON \
            -DWITH_UNIT_TESTS=OFF \
            -DENABLE_DTRACE=OFF \
            -DPLUGIN_AUTH_PAM=NO \
            -DBISON_EXECUTABLE=$(brew --prefix bison)/bin/bison

          make -j$(sysctl -n hw.logicalcpu)
          make install

      - name: Build MariaDB (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir build && cd build

          cmake ../mariadb-src \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/../install \
            -DWITH_SSL=bundled \
            -DWITH_ZLIB=bundled \
            -DWITHOUT_ROCKSDB=ON \
            -DWITHOUT_TOKUDB=ON \
            -DWITHOUT_MROONGA=ON \
            -DWITHOUT_SPIDER=ON \
            -DWITHOUT_CONNECT=ON \
            -DWITHOUT_OQGRAPH=ON \
            -DWITHOUT_SPHINX=ON \
            -DWITHOUT_FEDERATED=ON \
            -DWITHOUT_FEDERATEDX=ON \
            -DWITHOUT_CASSANDRA=ON \
            -DWITHOUT_SEQUENCE=OFF \
            -DWITHOUT_PERFSCHEMA_STORAGE_ENGINE=ON \
            -DWITHOUT_TEST_DB=ON \
            -DWITHOUT_EXAMPLE_STORAGE_ENGINE=ON \
            -DWITH_UNIT_TESTS=OFF \
            -DENABLE_DTRACE=OFF \
            -DPLUGIN_AUTH_PAM=NO

          make -j$(nproc)
          make install

      - name: Discover mysql_install_db
        run: |
          echo "=== Checking for mysql_install_db ==="
          echo "install/bin:"
          ls install/bin/ | grep -i install || echo "  (not in bin/)"
          echo "install/scripts:"
          ls install/scripts/ 2>/dev/null | grep -i install || echo "  (scripts/ missing or empty)"

          # Determine init strategy for this build
          if [ -f install/bin/mysql_install_db ] || [ -f install/scripts/mysql_install_db ]; then
            echo "INIT_STRATEGY=mysql_install_db" >> $GITHUB_ENV
            echo "✓ mysql_install_db found — will use Option A"
          else
            echo "INIT_STRATEGY=bootstrap_sql" >> $GITHUB_ENV
            echo "⚠ mysql_install_db not found — will fall back to bootstrap SQL"
          fi

      - name: Bundle dylibs and fix rpaths (macOS only)
        if: runner.os == 'macOS'
        run: |
          BIN_DIR=install/bin
          LIB_DIR=install/lib
          mkdir -p "$LIB_DIR"

          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck my_print_defaults; do
            [ -f "$BIN_DIR/$bin" ] || continue
            dylibbundler \
              --bundle-deps \
              --fix-file "$BIN_DIR/$bin" \
              --dest-dir "$LIB_DIR" \
              --install-path "@loader_path/../lib/" \
              --overwrite-files \
              2>&1 | grep -v "^$" || true
          done

          for dylib in "$LIB_DIR"/*.dylib; do
            [ -f "$dylib" ] && install_name_tool -id "@loader_path/$(basename $dylib)" "$dylib" 2>/dev/null || true
          done

      - name: Strip debug symbols
        run: |
          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck my_print_defaults; do
            [ -f "install/bin/$bin" ] && strip -S "install/bin/$bin" || true
          done

      - name: Smoke test — mysqld --version
        run: |
          MYSQLD=$([ -f ./install/bin/mysqld ] && echo ./install/bin/mysqld || echo ./install/bin/mariadbd)
          $MYSQLD --version

      - name: Ad-hoc sign binaries and dylibs (macOS only)
        if: runner.os == 'macOS'
        run: |
          for bin in install/bin/mysqld install/bin/mariadbd install/bin/mysql install/bin/mariadb \
                     install/bin/mysqladmin install/bin/mysqldump install/bin/mysqlcheck install/bin/my_print_defaults; do
            [ -f "$bin" ] && codesign --sign - --force "$bin" || true
          done
          for dylib in install/lib/*.dylib; do
            [ -f "$dylib" ] && codesign --sign - --force "$dylib" || true
          done

      - name: Package
        run: |
          VERSION=${{ inputs.mariadb_version }}
          PLATFORM=${{ matrix.platform }}
          TARNAME="bin-${PLATFORM}-${VERSION}.tar.gz"

          mkdir -p dist/bin dist/lib dist/share

          for bin in mysqld mariadbd mysql mariadb mysqladmin mysqldump mysqlcheck my_print_defaults; do
            [ -f "install/bin/$bin" ] && cp "install/bin/$bin" dist/bin/ || true
          done

          # Option A: bundle mysql_install_db if present (prefer bin/, fall back to scripts/)
          if [ -f install/bin/mysql_install_db ]; then
            cp install/bin/mysql_install_db dist/bin/
            echo "Packaged mysql_install_db from bin/ (Option A)"
          elif [ -f install/scripts/mysql_install_db ]; then
            cp install/scripts/mysql_install_db dist/bin/
            echo "Packaged mysql_install_db from scripts/ (Option A)"
          else
            echo "mysql_install_db not found — addon will use bootstrap SQL fallback (Option B)"
          fi

          cp install/lib/*.dylib dist/lib/ 2>/dev/null || true
          cp install/lib/*.so* dist/lib/ 2>/dev/null || true

          # share/ has SQL init scripts — needed for both Option A and B
          cp -r install/share/. dist/share/

          tar czf "$TARNAME" -C dist .
          echo "Init strategy: $INIT_STRATEGY"
          echo "Built: $TARNAME ($(ls -lh $TARNAME | awk '{print $5}'))"

      - name: Generate checksum
        run: |
          VERSION=${{ inputs.mariadb_version }}
          PLATFORM=${{ matrix.platform }}
          TARNAME="bin-${PLATFORM}-${VERSION}.tar.gz"
          shasum -a 256 "$TARNAME" > "${TARNAME}.sha256"
          cat "${TARNAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-${{ inputs.mariadb_version }}-${{ matrix.platform }}
          path: |
            bin-${{ matrix.platform }}-${{ inputs.mariadb_version }}.tar.gz
            bin-${{ matrix.platform }}-${{ inputs.mariadb_version }}.tar.gz.sha256
          retention-days: 7
